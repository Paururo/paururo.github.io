<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I2SysBio Researchers Map</title>
<script src="https://unpkg.com/deck.gl@9.1.7/dist.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0a0a1a; color: #e0e0e0; overflow: hidden; }
#container { position: relative; width: 100vw; height: 100vh; }
#deck-canvas { width: 100%; height: 100%; }

#controls {
  position: absolute; top: 16px; left: 16px; z-index: 10;
  display: flex; flex-direction: column; gap: 8px;
}
#search-box {
  padding: 10px 14px; border-radius: 8px; border: 1px solid #333;
  background: rgba(20, 20, 40, 0.9); color: #fff; font-size: 14px;
  width: 280px; backdrop-filter: blur(8px);
}
#search-box::placeholder { color: #666; }
#min-works-control {
  background: rgba(20, 20, 40, 0.9); border: 1px solid #333;
  border-radius: 8px; padding: 8px 14px; width: 380px;
  backdrop-filter: blur(8px);
}
#min-works-label { font-size: 13px; display: block; margin-bottom: 4px; }
#min-works-slider {
  width: 100%; cursor: pointer;
  accent-color: #6ec4a5;
}
#color-selector {
  padding: 8px 12px; border-radius: 8px; border: 1px solid #333;
  background: rgba(20, 20, 40, 0.9); color: #fff; font-size: 13px;
  width: 280px; cursor: pointer; backdrop-filter: blur(8px);
}

#tooltip {
  position: absolute; z-index: 20; pointer-events: none;
  background: rgba(15, 15, 30, 0.95); border: 1px solid #444;
  border-radius: 10px; padding: 12px 16px; font-size: 13px;
  max-width: 320px; display: none; backdrop-filter: blur(12px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
#tooltip .name { font-size: 16px; font-weight: 700; margin-bottom: 6px; color: #fff; }
#tooltip .field { margin: 3px 0; color: #aaa; }
#tooltip .field b { color: #ccc; }
#tooltip .keywords { font-style: italic; color: #888; margin-top: 4px; font-size: 12px; }

#legend {
  position: absolute; bottom: 16px; right: 16px; z-index: 10;
  background: rgba(15, 15, 30, 0.9); border: 1px solid #333;
  border-radius: 10px; padding: 14px 18px; font-size: 12px;
  max-height: 60vh; overflow-y: auto; min-width: 180px;
  backdrop-filter: blur(8px);
}
#legend h3 { margin-bottom: 8px; font-size: 13px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
.legend-item {
  display: flex; align-items: center; gap: 8px; padding: 3px 0;
  cursor: pointer; opacity: 0.9; transition: opacity 0.2s;
}
.legend-item:hover { opacity: 1; }
.legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.legend-label { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }

#stats {
  position: absolute; top: 16px; right: 16px; z-index: 10;
  background: rgba(15, 15, 30, 0.9); border: 1px solid #333;
  border-radius: 10px; padding: 12px 16px; font-size: 12px;
  backdrop-filter: blur(8px);
}
#stats .stat { margin: 2px 0; color: #888; }
#stats .stat b { color: #ccc; }

/* Co-authorship toggle */
.toggle-row {
  display: flex; align-items: center; gap: 6px;
  background: rgba(20, 20, 40, 0.9); border: 1px solid #333;
  border-radius: 8px; padding: 7px 12px; width: 280px;
  backdrop-filter: blur(8px); font-size: 13px; color: #ccc;
  cursor: pointer; user-select: none;
}
.toggle-row input { accent-color: #6ec4a5; cursor: pointer; }
.toggle-row:hover { border-color: #555; }

/* Topic cloud */
#topic-cloud {
  position: absolute; bottom: 16px; left: 16px; z-index: 10;
  background: rgba(15, 15, 30, 0.95); border: 1px solid #333;
  border-radius: 10px; padding: 16px 20px; font-size: 12px;
  max-width: 480px; max-height: 50vh; overflow-y: auto;
  backdrop-filter: blur(12px); display: none;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
#topic-cloud h3 {
  margin-bottom: 10px; font-size: 13px; color: #aaa;
  text-transform: uppercase; letter-spacing: 1px;
  display: flex; justify-content: space-between; align-items: center;
}
#topic-cloud .close {
  cursor: pointer; font-size: 18px; color: #666; padding: 0 4px;
}
#topic-cloud .close:hover { color: #fff; }
#topic-chips {
  display: flex; flex-wrap: wrap; gap: 6px; line-height: 1.6;
}
.topic-chip {
  display: inline-block; padding: 3px 10px; border-radius: 12px;
  background: rgba(110, 196, 165, 0.15); color: #9dd;
  cursor: pointer; transition: all 0.2s; white-space: nowrap;
  border: 1px solid transparent;
}
.topic-chip:hover { background: rgba(110, 196, 165, 0.3); color: #fff; }
.topic-chip.active {
  background: rgba(110, 196, 165, 0.4); border-color: #6ec4a5; color: #fff;
}

/* Profile card */
#profile-card {
  position: absolute; z-index: 30;
  background: rgba(15, 15, 30, 0.97); border: 1px solid #444;
  border-radius: 14px; padding: 20px; font-size: 13px;
  width: 360px; max-height: 80vh; overflow-y: auto; display: none; backdrop-filter: blur(16px);
  box-shadow: 0 12px 48px rgba(0,0,0,0.6);
}
#profile-card .pc-close {
  position: absolute; top: 10px; right: 14px;
  cursor: pointer; font-size: 20px; color: #666; z-index: 1;
}
#profile-card .pc-close:hover { color: #fff; }
#profile-card .pc-header {
  display: flex; gap: 16px; align-items: flex-start; margin-bottom: 14px;
}
#profile-card .pc-photo {
  width: 90px; height: 90px; border-radius: 50%; object-fit: cover;
  flex-shrink: 0; border: 2px solid #444; background: #1a1a2e;
}
#profile-card .pc-initials {
  width: 90px; height: 90px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; font-weight: 700; color: #fff;
  flex-shrink: 0; border: 2px solid #444;
}
#profile-card .pc-name {
  font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 4px;
}
#profile-card .pc-role { color: #aaa; font-size: 12px; }
#profile-card .pc-field {
  margin: 5px 0; color: #aaa;
}
#profile-card .pc-field b { color: #ccc; }
#profile-card .pc-topics {
  margin-top: 10px; font-size: 12px; color: #888; line-height: 1.5;
}
#profile-card .pc-link {
  display: inline-block; margin-top: 12px; padding: 6px 14px;
  border-radius: 6px; background: rgba(110, 196, 165, 0.2);
  color: #6ec4a5; text-decoration: none; font-size: 12px;
  border: 1px solid rgba(110, 196, 165, 0.3);
  transition: background 0.2s;
}
#profile-card .pc-link:hover { background: rgba(110, 196, 165, 0.35); }
#profile-card .pc-keywords {
  margin-top: 8px; font-size: 11px; color: #999; line-height: 1.5;
  max-height: 60px; overflow-y: auto;
}
#profile-card .pc-network {
  margin-top: 8px; padding: 8px 10px; border-radius: 6px;
  background: rgba(110, 196, 165, 0.08); font-size: 12px; color: #aaa;
}
#profile-card .pc-network b { color: #6ec4a5; }
#profile-card .pc-pubs {
  margin-top: 10px; max-height: 200px; overflow-y: auto;
  font-size: 11px; border-top: 1px solid #333; padding-top: 8px;
}
#profile-card .pc-pubs h4 {
  font-size: 12px; color: #aaa; margin-bottom: 6px;
  text-transform: uppercase; letter-spacing: 0.5px;
}
#profile-card .pc-pub {
  padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
  line-height: 1.4;
}
#profile-card .pc-pub .pub-title { color: #ccc; }
#profile-card .pc-pub .pub-year { color: #888; font-size: 10px; }
#profile-card .pc-pub a { color: #6ec4a5; text-decoration: none; font-size: 10px; }
#profile-card .pc-pub a:hover { text-decoration: underline; }
</style>
</head>

<div id="container">
  <canvas id="deck-canvas"></canvas>
  <div id="controls">
    <input type="text" id="search-box" placeholder="Search researcher..." autocomplete="off">

  </div>
  <div id="tooltip"></div>

  <div id="stats"></div>
  <div id="topic-cloud">

    <div id="topic-chips"></div>
  </div>
</div>

      tx: p ? p.nx : d.nx,
      ty: p ? p.ny : d.ny,
      sx: d.nx,
      sy: d.ny,
      wasVisible: d._visible,
    };
  });

  const startTime = performance.now();

  function step(now) {
    const elapsed = now - startTime;
    const progress = Math.min(1, elapsed / duration);
    // Ease out cubic
    const ease = 1 - Math.pow(1 - progress, 3);

    DATA.forEach((d, i) => {
      const tgt = targets[i];
      d.nx = tgt.sx + (tgt.tx - tgt.sx) * ease;
      d.ny = tgt.sy + (tgt.ty - tgt.sy) * ease;

      // Fade in/out visibility
      if (tgt.hasPos) {
        d._visible = true;
        d._opacity = tgt.wasVisible ? 1 : ease;
      } else {
        d._opacity = 1 - ease;
        if (progress >= 1) d._visible = false;
      }
    });

    updateLayers();

    if (progress < 1) {
      animationFrame = requestAnimationFrame(step);
    } else {
      // Final snap
      DATA.forEach((d, i) => {
        d._opacity = 1;
        const tgt = targets[i];
        if (!tgt.hasPos) d._visible = false;
      });
      updateLayers();
      renderStats();
    }
  }

  if (animationFrame) cancelAnimationFrame(animationFrame);
  animationFrame = requestAnimationFrame(step);
}

// --- Preload images ---
const imageCache = {};
const PLACEHOLDER_SIZE = 64;

function createInitialsImage(name, color) {
  const canvas = document.createElement("canvas");
  canvas.width = PLACEHOLDER_SIZE;
  canvas.height = PLACEHOLDER_SIZE;
  const ctx = canvas.getContext("2d");

  // Background circle
  ctx.fillStyle = `rgb(${color[0]}, ${color[1]}, ${color[2]})`;
  ctx.beginPath();
  ctx.arc(PLACEHOLDER_SIZE/2, PLACEHOLDER_SIZE/2, PLACEHOLDER_SIZE/2, 0, Math.PI * 2);
  ctx.fill();

  // Initials
  const parts = name.split(" ").filter(Boolean);
  const initials = parts.length >= 2
    ? (parts[0][0] + parts[parts.length - 1][0]).toUpperCase()
    : (parts[0] || "?").substring(0, 2).toUpperCase();
  ctx.fillStyle = "#fff";
  ctx.font = `bold ${PLACEHOLDER_SIZE * 0.4}px sans-serif`;
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(initials, PLACEHOLDER_SIZE/2, PLACEHOLDER_SIZE/2);

  return canvas.toDataURL();
}

function preloadImages() {
  DATA.forEach(d => {
    if (d.image_url) {
      const img = new Image();
      img.crossOrigin = "anonymous";
      img.onload = () => {
        // Create circular version
        const size = 128;
        const canvas = document.createElement("canvas");
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext("2d");
        ctx.beginPath();
        ctx.arc(size/2, size/2, size/2, 0, Math.PI * 2);
        ctx.clip();
        // Draw image covering the circle
        const aspect = img.width / img.height;
        let sx = 0, sy = 0, sw = img.width, sh = img.height;
        if (aspect > 1) { sx = (img.width - img.height) / 2; sw = img.height; }
        else { sy = (img.height - img.width) / 2; sh = img.width; }
        ctx.drawImage(img, sx, sy, sw, sh, 0, 0, size, size);
        imageCache[d.orcid_id] = canvas.toDataURL();
        updateLayers();
      };
      img.onerror = () => {
        imageCache[d.orcid_id] = createInitialsImage(d.name, colorMap[d[currentColorField] || "Unknown"] || PALETTE[0]);
      };
      img.src = d.image_url;
    } else {
      imageCache[d.orcid_id] = createInitialsImage(d.name, colorMap[d[currentColorField] || "Unknown"] || PALETTE[0]);
    }
  });
}

// --- deck.gl setup (OrthographicView for non-geo data) ---
const INITIAL_VIEW_STATE = {
  target: [0, 0, 0],
  zoom: -0.5,
  minZoom: -3,
  maxZoom: 8,
};

const tooltipEl = document.getElementById("tooltip");

function getFilteredData() {
  let filtered = DATA.filter(d => d._visible !== false);
  if (searchTerm) {
    const term = searchTerm.toLowerCase();
    filtered = filtered.map(d => ({
      ...d,
      _match: d.name.toLowerCase().includes(term) ||
              d.group.toLowerCase().includes(term) ||
              (d.keywords || "").toLowerCase().includes(term),
    }));
  } else {
    filtered = filtered.map(d => ({ ...d, _match: true }));
  }
  if (highlightedGroup !== null) {
    filtered = filtered.map(d => ({
      ...d,
      _match: d._match && d[currentColorField] === highlightedGroup,
    }));
  }
  if (selectedTopic !== null) {
    filtered = filtered.map(d => ({
      ...d,
      _match: d._match && (d.topic_list || []).some(t => t.name === selectedTopic),
    }));
  }
  return filtered;
}

let currentZoom = -0.5;

function createLayers() {
  const filtered = getFilteredData();

  const showPhotos = currentZoom > 0;
  const showNames = currentZoom > 0.5;

  // Build set of connected names for "connected only" mode
  let connectedNames = null;
  if (connectedPhotosOnly && selectedName) {
    connectedNames = new Set([selectedName]);
    EDGES.forEach(e => {
      if (e.source === selectedName) connectedNames.add(e.target);
      if (e.target === selectedName) connectedNames.add(e.source);
    });
  }

  const layers = [];

  // Co-authorship lines (rendered first = behind dots)
  if (showCoauthorship) {
    const visibleNames = new Set(filtered.filter(d => d._visible !== false).map(d => d.name));
    const lineData = EDGES.filter(e => visibleNames.has(e.source) && visibleNames.has(e.target));
    layers.push(new deck.LineLayer({
      id: "coauthorship",
      data: lineData,
      getSourcePosition: e => { const d = DATA[nameIndex[e.source]]; return [d.nx, d.ny]; },
      getTargetPosition: e => { const d = DATA[nameIndex[e.target]]; return [d.nx, d.ny]; },
      getColor: e => {
        const active = selectedName || hoveredName;
        if (active && (e.source === active || e.target === active))
          return [110, 196, 165, 220];
        if (active) return [110, 196, 165, 15];
        return [110, 196, 165, 50];
      },
      getWidth: e => Math.min(5, 1 + e.weight * 0.5),
      widthUnits: "pixels",
      updateTriggers: {
        getColor: [hoveredName, selectedName, layerVersion],
        getSourcePosition: [layerVersion],
        getTargetPosition: [layerVersion],
      },
    }));
  }

  layers.push(new deck.ScatterplotLayer({
      id: "scatter",
      data: filtered,
      getPosition: d => [d.nx, d.ny],
      getFillColor: d => {
        const c = colorMap[d[currentColorField] || "Unknown"] || PALETTE[0];
        const isConnected = !connectedNames || connectedNames.has(d.name);
        const baseAlpha = (d._match && isConnected) ? 220 : 30;
        const alpha = Math.round(baseAlpha * (d._opacity != null ? d._opacity : 1));
        return [c[0], c[1], c[2], alpha];
      },
      getRadius: d => {
        const metric = d.total_citations > 0 ? d.total_citations / 20 : d.num_works / 6;
        const base = 6 + Math.min(14, metric);
        const isConnected = !connectedNames || connectedNames.has(d.name);
        return (d._match && isConnected) ? base : base * 0.5;
      },
      getLineColor: d => {
        const isConnected = !connectedNames || connectedNames.has(d.name);
        return (d._match && isConnected) ? [255, 255, 255, 120] : [255, 255, 255, 20];
      },
      getLineWidth: 1,
      lineWidthUnits: "pixels",
      stroked: true,
      radiusUnits: "pixels",
      radiusScale: 1,
      radiusMinPixels: 5,
      radiusMaxPixels: 30,
      pickable: true,
      onHover: onHover,
      onClick: onClick,
      transitions: {
        getFillColor: 400,
        getRadius: 400,
        getLineColor: 400,
      },
      updateTriggers: {
        getFillColor: [currentColorField, searchTerm, highlightedGroup, currentMinWorks, connectedPhotosOnly, selectedName, layerVersion],
        getPosition: [layerVersion],
        getRadius: [searchTerm, highlightedGroup, connectedPhotosOnly, selectedName],
        getLineColor: [searchTerm, highlightedGroup, connectedPhotosOnly, selectedName],
      },
    }));

  if (showNames) {
    layers.push(new deck.TextLayer({
      id: "labels",
      data: filtered.filter(d => d._match && (!connectedNames || connectedNames.has(d.name))),
      getPosition: d => [d.nx, d.ny],
      getText: d => d.family_name,
      getSize: Math.min(14, 8 + currentZoom * 1.5),
      getColor: [255, 255, 255, 200],
      getPixelOffset: [0, showPhotos ? -22 : -14],
      fontFamily: "-apple-system, BlinkMacSystemFont, sans-serif",
      fontWeight: 600,
      characterSet: "auto",
      outlineWidth: 3,
      outlineColor: [10, 10, 26, 200],
      billboard: true,
      sizeScale: 1,
      sizeMinPixels: 8,
      sizeMaxPixels: 18,
      collisionEnabled: true,
      getCollisionPriority: d => d.num_works || 0,
      updateTriggers: {
        getData: [searchTerm, highlightedGroup, connectedPhotosOnly, selectedName],
      },
    }));
  }

  if (showPhotos) {
    let photoData = filtered.filter(d => d._match && imageCache[d.orcid_id]);
    if (connectedNames) {
      photoData = photoData.filter(d => connectedNames.has(d.name));
    }
    const photoSize = Math.min(50, 24 + currentZoom * 6);

    // Colored border ring behind photos
    layers.push(new deck.ScatterplotLayer({
      id: "photo-borders",
      data: photoData,
      getPosition: d => [d.nx, d.ny],
      getFillColor: d => {
        const c = colorMap[d[currentColorField] || "Unknown"] || PALETTE[0];
        return [c[0], c[1], c[2], 240];
      },
      getRadius: d => photoSize / 2 + 3,
      radiusUnits: "pixels",
      radiusMinPixels: 15,
      radiusMaxPixels: 36,
      updateTriggers: {
        getFillColor: [currentColorField],
        getData: [searchTerm, highlightedGroup, connectedPhotosOnly, selectedName],
      },
    }));

    // Photo icons
    layers.push(new deck.IconLayer({
      id: "photos",
      data: photoData,
      getPosition: d => [d.nx, d.ny],
      getIcon: d => ({
        url: imageCache[d.orcid_id],
        width: 128,
        height: 128,
        anchorY: 64,
        anchorX: 64,
      }),
      getSize: photoSize,
      sizeScale: 1,
      sizeMinPixels: 24,
      sizeMaxPixels: 64,
      pickable: true,
      onHover: onHover,
      onClick: onClick,
      updateTriggers: {
        getData: [searchTerm, highlightedGroup, connectedPhotosOnly, selectedName],
        getIcon: [Object.keys(imageCache).length],
      },
    }));
  }

  return layers;
}

function onHover(info) {
  const prevHovered = hoveredName;
  hoveredName = info.object ? info.object.name : null;
  if (showCoauthorship && prevHovered !== hoveredName) updateLayers();
  if (!tooltipOnHover) {
    tooltipEl.style.display = "none";
    return;
  }
  if (info.object) {
    const d = info.object;
    const c = colorMap[d[currentColorField] || "Unknown"] || PALETTE[0];
    const kw = d.keywords ? `<div class="keywords">${d.keywords.substring(0, 120)}${d.keywords.length > 120 ? "..." : ""}</div>` : "";
    const topics = d.topics ? `<div class="field"><b>Topics:</b> ${d.topics}</div>` : "";
    const citations = d.total_citations > 0 ? `<div class="field"><b>Citations:</b> ${d.total_citations.toLocaleString()} (h-index: ${d.h_index})</div>` : "";
    tooltipEl.innerHTML = `
      <div class="name" style="color: rgb(${c[0]}, ${c[1]}, ${c[2]})">${d.name}</div>
      <div class="field"><b>Group:</b> ${d.group}</div>
      <div class="field"><b>Program:</b> ${d.program}</div>
      <div class="field"><b>Area:</b> ${d.area}</div>
      <div class="field"><b>Role:</b> ${d.role}</div>
      <div class="field"><b>Publications:</b> ${d.num_works}</div>
      ${citations}
      <div class="field"><b>ORCID:</b> ${d.orcid_id}</div>
      ${topics}
      ${kw}
    `;
    tooltipEl.style.display = "block";
    tooltipEl.style.left = (info.x + 16) + "px";
    tooltipEl.style.top = (info.y + 16) + "px";
    // Keep tooltip in viewport
    const rect = tooltipEl.getBoundingClientRect();
    if (rect.right > window.innerWidth) tooltipEl.style.left = (info.x - rect.width - 8) + "px";
    if (rect.bottom > window.innerHeight) tooltipEl.style.top = (info.y - rect.height - 8) + "px";
  } else {
    tooltipEl.style.display = "none";
  }
}

function onClick(info) {
  const card = document.getElementById("profile-card");
  if (!info.object) {
    card.style.display = "none";
    selectedName = null;
    updateLayers();
    return;
  }
  const d = info.object;
  selectedName = d.name;
  // Auto-enable co-authorships on click
  if (!showCoauthorship) {
    showCoauthorship = true;
    document.getElementById("coauth-toggle").checked = true;
  }
  const c = colorMap[d[currentColorField] || "Unknown"] || PALETTE[0];

  const photoHtml = d.image_url
    ? `<img class="pc-photo" src="${d.image_url}" crossorigin="anonymous" onerror="this.outerHTML='<div class=\'pc-initials\' style=\'background:rgb(${c[0]},${c[1]},${c[2]})\'>${(d.given_name||'')[0] || ''}</div>'">`
    : `<div class="pc-initials" style="background:rgb(${c[0]},${c[1]},${c[2]})">${(d.given_name||'')[0] || '?'}</div>`;

  const topics = (d.topic_list || []).slice(0, 5).map(t => t.name).join(", ");
  const topicsHtml = topics ? `<div class="pc-topics"><b>Topics:</b> ${topics}</div>` : "";
  const citationsHtml = d.total_citations > 0
    ? `<div class="pc-field"><b>Citations:</b> ${d.total_citations.toLocaleString()} &middot; <b>h-index:</b> ${d.h_index}</div>` : "";
  const orcidHtml = d.orcid_url
    ? `<a class="pc-link" href="${d.orcid_url}" target="_blank">View ORCID profile &rarr;</a>` : "";

  // Full keywords
  const keywordsHtml = d.keywords
    ? `<div class="pc-keywords"><b>Keywords:</b> ${d.keywords}</div>` : "";

  // Network metrics
  const coauthors = new Set();
  EDGES.forEach(e => {
    if (e.source === d.name) coauthors.add(e.target);
    if (e.target === d.name) coauthors.add(e.source);
  });
  const networkHtml = coauthors.size > 0
    ? `<div class="pc-network"><b>${coauthors.size}</b> collaborators at I2SysBio</div>` : "";

  // Publications list
  const works = d.works || [];
  const pubsHtml = works.length > 0
    ? `<div class="pc-pubs"><h4>Recent publications (${d.num_works} total)</h4>${works.map(w => {
        const doi = w.doi ? `<a href="https://doi.org/${w.doi}" target="_blank">DOI</a>` : "";
        return `<div class="pc-pub"><span class="pub-title">${w.title}</span> <span class="pub-year">${w.year}</span> ${doi}</div>`;
      }).join("")}</div>` : "";

  card.innerHTML = `
    <span class="pc-close">&times;</span>
    <div class="pc-header">
      ${photoHtml}
      <div>
        <div class="pc-name" style="color:rgb(${c[0]},${c[1]},${c[2]})">${d.name}</div>
        <div class="pc-role">${d.role} &middot; ${d.area}</div>
      </div>
    </div>
    <div class="pc-field"><b>Group:</b> ${d.group}</div>
    <div class="pc-field"><b>Program:</b> ${d.program}</div>
    <div class="pc-field"><b>Publications:</b> ${d.num_works}</div>
    ${citationsHtml}
    ${networkHtml}
    ${topicsHtml}
    ${keywordsHtml}
    ${orcidHtml}
    ${pubsHtml}
  `;
  card.style.display = "block";

  // Position near click but keep in viewport
  let left = info.x + 20;
  let top = info.y - 60;
  card.style.left = left + "px";
  card.style.top = top + "px";
  requestAnimationFrame(() => {
    const rect = card.getBoundingClientRect();
    if (rect.right > window.innerWidth) card.style.left = (info.x - rect.width - 10) + "px";
    if (rect.bottom > window.innerHeight) card.style.top = Math.max(10, window.innerHeight - rect.height - 10) + "px";
    if (rect.top < 0) card.style.top = "10px";
  });

  card.querySelector(".pc-close").addEventListener("click", () => {
    card.style.display = "none";
    selectedName = null;
    updateLayers();
  });

  // Make card draggable from header
  const header = card.querySelector(".pc-header");
  header.style.cursor = "grab";
  let dragging = false, dragOffX = 0, dragOffY = 0;
  header.onmousedown = header.ontouchstart = function(ev) {
    dragging = true;
    header.style.cursor = "grabbing";
    const e = ev.touches ? ev.touches[0] : ev;
    const rect = card.getBoundingClientRect();
    dragOffX = e.clientX - rect.left;
    dragOffY = e.clientY - rect.top;
    ev.preventDefault();
  };
  document.addEventListener("mousemove", function(ev) {
    if (!dragging) return;
    card.style.left = (ev.clientX - dragOffX) + "px";
    card.style.top = (ev.clientY - dragOffY) + "px";
  });
  document.addEventListener("touchmove", function(ev) {
    if (!dragging) return;
    card.style.left = (ev.touches[0].clientX - dragOffX) + "px";
    card.style.top = (ev.touches[0].clientY - dragOffY) + "px";
  });
  document.addEventListener("mouseup", function() { dragging = false; header.style.cursor = "grab"; });
  document.addEventListener("touchend", function() { dragging = false; header.style.cursor = "grab"; });

  updateLayers();
}

function updateLayers() {
  layerVersion++;
  deckgl.setProps({ layers: createLayers() });
  const tc = document.getElementById("topic-cloud");
  if (tc && tc.style.display !== "none") renderTopicCloud();
  if (typeof saveStateToHash === "function") saveStateToHash();
}

const deckgl = new deck.DeckGL({
  container: "container",
  views: new deck.OrthographicView({ flipY: false }),
  initialViewState: INITIAL_VIEW_STATE,
  controller: { dragRotate: false },
  useDevicePixels: true,

  layers: createLayers(),
  onViewStateChange: ({ viewState }) => {
    currentZoom = viewState.zoom;
    deckgl.setProps({ layers: createLayers() });
  },
  getTooltip: () => null,
});

// --- Min works slider ---
const minWorksSlider = document.getElementById("min-works-slider");
const minWorksLabel = document.getElementById("min-works-label");

// Set slider steps to match available thresholds
minWorksSlider.min = 0;
minWorksSlider.max = THRESHOLDS[THRESHOLDS.length - 1];
minWorksSlider.step = 1;

minWorksSlider.addEventListener("input", (e) => {
  const val = parseInt(e.target.value);
  minWorksLabel.textContent = `Min. publications: ${val}`;

  // Find nearest threshold with a layout
  let bestThresh = 0;
  for (const t of THRESHOLDS) {
    if (t <= val) bestThresh = t;
  }

  if (bestThresh !== currentMinWorks) {
    currentMinWorks = bestThresh;
    animateToThreshold(bestThresh, 800);
  } else {
    // Just filter visibility without re-layout for intermediate values
    DATA.forEach(d => {
      d._visible = d.num_works >= val && d.positions && d.positions[String(bestThresh)];
    });
    updateLayers();
    renderStats();
  }
});

// --- Legend ---
function renderLegend() {
  const legendEl = document.getElementById("legend");
  const labels = { group: "Research Group", program: "Program", area: "Institution" };
  const entries = Object.entries(colorMap).sort((a, b) => a[0].localeCompare(b[0]));
  const counts = {};
  DATA.forEach(d => {
    const v = d[currentColorField] || "Unknown";
    counts[v] = (counts[v] || 0) + 1;
  });

  legendEl.innerHTML = `<h3>${labels[currentColorField] || currentColorField}</h3>` +
    entries.map(([label, color]) => `
      <div class="legend-item" data-group="${label}" title="${label} (${counts[label] || 0})">
        <div class="legend-dot" style="background: rgb(${color[0]}, ${color[1]}, ${color[2]})"></div>
        <span class="legend-label">${label} (${counts[label] || 0})</span>
      </div>
    `).join("");

  // Click to filter
  legendEl.querySelectorAll(".legend-item").forEach(el => {
    el.addEventListener("click", () => {
      const group = el.dataset.group;
      if (highlightedGroup === group) {
        highlightedGroup = null;
        legendEl.querySelectorAll(".legend-item").forEach(e => e.style.opacity = "");
      } else {
        highlightedGroup = group;
        legendEl.querySelectorAll(".legend-item").forEach(e => e.style.opacity = "0.3");
        el.style.opacity = "1";
      }
      updateLayers();
      renderSearchCount();
    });
  });
}

function renderStats() {
  const statsEl = document.getElementById("stats");
  const visible = DATA.filter(d => d._visible !== false);
  const withPhoto = visible.filter(d => d.image_url).length;
  const totalPubs = visible.reduce((sum, d) => sum + d.num_works, 0);

    <div class="stat"><b>${visible.length}</b> researchers</div>
    <div class="stat"><b>${withPhoto}</b> with photo</div>
    <div class="stat"><b>${totalPubs.toLocaleString()}</b> publications</div>

}

function renderTopicCloud() {
  const visible = getFilteredData().filter(d => d._match);
  const topicCounts = {};
  visible.forEach(d => {
    (d.topic_list || []).forEach(t => {
      topicCounts[t.name] = (topicCounts[t.name] || 0) + 1;
    });
  });
  const sorted = Object.entries(topicCounts).sort((a, b) => b[1] - a[1]).slice(0, 40);
  const maxCount = sorted[0]?.[1] || 1;

  document.getElementById("topic-chips").innerHTML = sorted.map(([name, count]) => {
    const size = 11 + (count / maxCount) * 13;
    const opacity = 0.5 + (count / maxCount) * 0.5;
    const active = selectedTopic === name ? " active" : "";
    return `<span class="topic-chip${active}" data-topic="${name}"
      style="font-size:${size}px; opacity:${opacity}">${name} (${count})</span>`;
  }).join("");

  // Click handlers
  document.querySelectorAll(".topic-chip").forEach(el => {
    el.addEventListener("click", () => {
      const topic = el.dataset.topic;
      if (selectedTopic === topic) {
        selectedTopic = null;
      } else {
        selectedTopic = topic;
      }
      updateLayers();
      renderTopicCloud();
      renderSearchCount();
    });
  });
}

// --- URL state sharing ---
function saveStateToHash() {
  const state = {};
  if (searchTerm) state.q = searchTerm;
  if (currentColorField !== "group") state.color = currentColorField;
  if (highlightedGroup) state.legend = highlightedGroup;
  if (selectedTopic) state.topic = selectedTopic;
  if (currentMinWorks > 0) state.min = currentMinWorks;
  if (selectedName) state.sel = selectedName;
  const hash = Object.keys(state).length > 0
    ? "#" + Object.entries(state).map(([k, v]) => `${k}=${encodeURIComponent(v)}`).join("&")
    : "";
  history.replaceState(null, "", hash || window.location.pathname);
}

function loadStateFromHash() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  const params = {};
  hash.split("&").forEach(p => {
    const [k, v] = p.split("=");
    if (k && v) params[k] = decodeURIComponent(v);
  });
  if (params.color) {
    currentColorField = params.color;
    colorMap = buildColorMap(DATA, currentColorField);
    document.getElementById("color-selector").value = currentColorField;
  }
  if (params.q) {
    searchTerm = params.q;
    document.getElementById("search-box").value = searchTerm;
  }
  if (params.legend) highlightedGroup = params.legend;
  if (params.topic) selectedTopic = params.topic;
  if (params.min) {
    const val = parseInt(params.min);
    if (!isNaN(val)) {
      currentMinWorks = val;
      document.getElementById("min-works-slider").value = val;
      document.getElementById("min-works-label").textContent = `Min. publications: ${val}`;
      animateToThreshold(val, 0);
    }
  }
  if (params.sel) selectedName = params.sel;
}


// --- Init ---
loadStateFromHash();
preloadImages();
renderLegend();
renderStats();
renderSearchCount();
updateLayers();
</script>
